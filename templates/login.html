<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود — Guardian AI</title>
  <style>
    :root{
      --bg:#07111f;
      --panel:rgba(7,17,31,.72);
      --stroke:rgba(147,197,253,.18);
      --text:#e8f2ff;
      --muted:#9fb4cf;
      --primary:#38bdf8;
      --primary-2:#0ea5e9;
      --danger:#ef4444;
      --card-radius:22px;
      --shadow:0 12px 35px rgba(2, 6, 23, .35);
      --blur:18px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;min-height:100%;
      font-family:"Vazirmatn","Segoe UI",Tahoma,Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(4,10,20,.72), rgba(4,10,20,.85)),
        url("/static/دنا.jpg") center center / cover no-repeat fixed;
    }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(circle at top right, rgba(56,189,248,.16), transparent 30%),
        radial-gradient(circle at bottom left, rgba(14,165,233,.12), transparent 28%);
      z-index:0;
    }
    .wrap{
      position:relative;z-index:1;min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .card{
      width:100%;max-width:400px;
      background:var(--panel);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      border-radius:var(--card-radius);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      padding:36px 30px;
    }
    .brand{text-align:center;margin-bottom:26px}
    .brand .logo{font-size:42px;line-height:1}
    .brand h1{font-size:22px;margin:12px 0 4px;font-weight:700}
    .brand p{margin:0;color:var(--muted);font-size:13px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
    .field input{
      width:100%;padding:13px 15px;
      background:rgba(12,28,48,.6);
      border:1px solid var(--stroke);
      border-radius:14px;
      color:var(--text);font-size:15px;outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(56,189,248,.15);
    }
    .btn{
      width:100%;padding:14px;border:none;cursor:pointer;
      border-radius:14px;font-size:16px;font-weight:700;color:#04121f;
      background:linear-gradient(135deg, var(--primary), var(--primary-2));
      transition:transform .15s, box-shadow .2s;
      margin-top:6px;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(56,189,248,.3)}
    .btn:active{transform:translateY(0)}
    .error{
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.4);
      color:#fecaca;
      padding:11px 14px;border-radius:12px;
      font-size:13px;margin-bottom:18px;text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <form class="card" method="POST" autocomplete="off">
      <div class="brand">
        <div class="logo">🛡️</div>
        <h1>Guardian AI</h1>
        <p>برای ورود به داشبورد وارد شوید</p>
      </div>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <div class="field">
        <label for="username">نام کاربری</label>
        <input type="text" id="username" name="username" required autofocus dir="ltr" />
      </div>

      <div class="field">
        <label for="password">رمز عبور</label>
        <input type="password" id="password" name="password" required dir="ltr" />
      </div>

      <button class="btn" type="submit">ورود</button>
    </form>
  </div>
</body>
</html>
